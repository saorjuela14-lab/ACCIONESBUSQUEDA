apiVersion: v1
kind: Namespace
metadata:
  name: nexbuy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexbuy-config
  namespace: nexbuy
data:
  APP_ENV: production
  LOG_LEVEL: INFO
  SCHEDULER_ENABLED: "true"
  WATCHLIST_SCAN_INTERVAL_MINUTES: "30"
  MEMORY_EVALUATION_DAYS: "90"
  ALERT_COOLDOWN_HOURS: "24"
  MARKET_TIMEZONE: America/New_York
  REPORT_TIMES: "08:30,11:30,15:00,17:30"
  POLYGON_API_BASE_URL: https://api.massive.com
  REDIS_URL: redis://redis:6379/0
---
apiVersion: v1
kind: Secret
metadata:
  name: nexbuy-secrets
  namespace: nexbuy
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://nexbuy:CHANGE_ME@postgres:5432/nexbuy
  FRED_API_KEY: ""
  POLYGON_API_KEY: ""
  ALPHA_VANTAGE_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexbuy-api
  namespace: nexbuy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexbuy-api
  template:
    metadata:
      labels:
        app: nexbuy-api
    spec:
      containers:
        - name: api
          image: nexbuy-investment-committee:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: nexbuy-config
            - secretRef:
                name: nexbuy-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: nexbuy-api
  namespace: nexbuy
spec:
  selector:
    app: nexbuy-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
