# SnapDeploy / producción: una sola app con SQLite (sin PostgreSQL ni Redis).
# Desarrollo local con Postgres+Redis: docker compose -f docker-compose.dev.yml up
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite+aiosqlite:///./data/nexbuy.db
      REDIS_ENABLED: "false"
      SCHEDULER_ENABLED: "true"
      DASHBOARD_ACCESS_TOKEN: ${DASHBOARD_ACCESS_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
