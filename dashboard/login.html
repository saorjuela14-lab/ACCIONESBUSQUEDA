<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060a0f" />
  <title>NexBuy — Acceso</title>
  <link rel="stylesheet" href="/dashboard/static/styles.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="term-brand" style="justify-content:center;margin-bottom:1rem">
      <span class="logo">NX</span> Terminal CEO NexBuy
    </div>
    <p class="muted" style="text-align:center;margin-bottom:1rem">Tu panel desde cualquier dispositivo</p>
    <label for="access-token">Token de acceso</label>
    <input id="access-token" type="password" placeholder="Pega tu token" autocomplete="current-password" />
    <button id="btn-login" class="btn primary" style="width:100%;margin-top:0.75rem;padding:0.65rem">Entrar al panel</button>
    <p id="login-error" class="login-error hidden"></p>
    <p class="muted" style="font-size:10px;margin-top:1rem;text-align:center">
      Guarda este enlace en tu celular: Añadir a pantalla de inicio
    </p>
  </div>
  <script>
    const API = "/api/v1";
    if (localStorage.getItem("nexbuy_token")) location.href = "/dashboard";

    document.getElementById("btn-login").onclick = async () => {
      const token = document.getElementById("access-token").value.trim();
      const err = document.getElementById("login-error");
      try {
        const r = await fetch(`${API}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        if (!r.ok) throw new Error("Token incorrecto");
        localStorage.setItem("nexbuy_token", token);
        location.href = "/dashboard";
      } catch (e) {
        err.textContent = e.message;
        err.classList.remove("hidden");
      }
    };
    fetch(`${API}/auth/status`).then(r => r.json()).then(s => {
      if (!s.auth_required) location.href = "/dashboard";
    });
  </script>
</body>
</html>
